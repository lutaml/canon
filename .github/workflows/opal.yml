name: opal

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Opal smoke tests require moxml which is not yet Opal-compatible.
# Track progress at https://github.com/lutaml/canon/issues/TBD
# Until resolved, this workflow is non-blocking.
jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Opal dependencies
        run: |
          bundle config set with opal
          bundle install

      - name: Run Opal smoke tests
        run: bundle exec rake spec:opal
